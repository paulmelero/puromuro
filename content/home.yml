hero:
  eyebrow: "Colectivo de arte urbano"
  title: "El muro es\nel origen"
  subtitle: "Pintura mural, graffiti y arte urbano. Transformamos espacios con arte que cuenta historias."
  ctaLabel: "Háblanos de tu proyecto"

about:
  label: "Nosotros"
  title: "EL PRIMER SOPORTE DE LA EXPRESIÓN HUMANA"
  lead: "Puro Muro nace de una redundancia fonética que busca subrayar una verdad absoluta: el muro es el origen."
  body:
    - "Somos un colectivo de personas que entienden la pintura como un ejercicio de respeto hacia el entorno. Venimos de una escuela de pintura rápida y de una relación puramente pasional con el espacio público; un impulso inicial que, con el tiempo, hemos transformado en un método de trabajo profesional y meticuloso."
    - "No buscamos imponer una identidad artística personal ni el exhibicionismo creativo. Nuestra formación en diseño gráfico nos permite abordar cada proyecto con una mentalidad distinta: escuchar y resolver."
  highlight: "Entendemos la pintura artesana como una herramienta capaz de adaptarse a la naturaleza de cada lugar."

