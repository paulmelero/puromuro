services:
  label: "Servicios"
  title: "LO QUE\nHACEMOS"
  intro: "Ofrecemos soluciones completas de pintura mural y arte urbano. Cada proyecto empieza escuchando."
  items:
    - num: "01"
      title: "Pintura Mural"
      description: "Murales artísticos de gran formato para fachadas, interiores y espacios comerciales. Cada muro es un proyecto único adaptado a su contexto."
    - num: "02"
      title: "Rotulación a mano"
      description: "Rótulos artesanales para comercios, escaparates y señalización. Letra viva que da carácter y personalidad a cualquier espacio."
    - num: "03"
      title: "Workshops"
      description: "Talleres de pintura mural, graffiti y lettering para todos los niveles. Aprendizaje directo con artistas en activo."
    - num: "04"
      title: "Ilustración"
      description: "Ilustración original para editoriales, marcas y proyectos creativos. Imágenes con identidad propia, hechas a mano."
